<script>
    function fitText(el){
    const cls = el.className || "";

    let startSize = 16;
    let minSize = 9;
    let maxSize = 20;

    if (cls.includes("doc_title") || cls.includes("paragraph_title")) {
        startSize = 24;
        minSize = 14;
        maxSize = 40;
    } 
    else if (cls.includes("figure_title") || cls.includes("table_caption")) {
        startSize = 16;
        minSize = 10;
        maxSize = 24;
    } 
    else if (cls.includes("abstract")) {
        startSize = 16;
        minSize = 9;
        maxSize = 30;
    }

    el.style.fontSize = startSize + "px";

    while (
        (el.scrollHeight > el.clientHeight ||
        el.scrollWidth > el.clientWidth) &&
        startSize > minSize
    ){
        startSize -= 0.5;
        el.style.fontSize = startSize + "px";
    }

    while (
        el.scrollHeight <= el.clientHeight &&
        el.scrollWidth <= el.clientWidth &&
        startSize < maxSize
    ){
        const next = startSize + 0.5;
        el.style.fontSize = next + "px";

        if (el.scrollHeight > el.clientHeight || el.scrollWidth > el.clientWidth){
            el.style.fontSize = startSize + "px";
            break;
        }
        startSize = next;
    }
}

function fitAllText(){
    document.querySelectorAll('.auto-fit').forEach(fitText);
}

document.addEventListener("DOMContentLoaded", fitAllText);

window.addEventListener("load", () => {
    fitAllText();

    if (window.MathJax?.typesetPromise){
        MathJax.typesetPromise().then(fitAllText);
    }
});
</script>
