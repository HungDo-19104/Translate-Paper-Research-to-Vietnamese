<style>
body{
  font-family: "Latin Modern Roman", serif;
  line-height:1.6;
  background:#e0e0e0;
  margin:0;
}

/* page layout giữ nguyên */
.page{
  position:relative;
  width:1224px;
  height:1584px;
  background:white;
  margin:20px auto;
  box-shadow:0 6px 18px rgba(0,0,0,0.1);
  overflow:hidden;
}

/* block OCR */
.block{
  word-break: normal;
  overflow-wrap: break-word;
  hyphens: auto;
  position:absolute;
  box-sizing:border-box;
  overflow:hidden;
  white-space:pre-wrap;
  line-height:1.2;
  text-align: justify
}

h1, h2 {
  margin: 0
}

/* ===== TITLE ===== */

.block.doc_title{
  font-size:26px;
  font-weight:bold;
  text-align:center;
}

.block.paragraph_title{
  font-weight:bold;
}

/* ===== CAPTION ===== */

.block.figure_title,
.block.table_caption{
}

/* ===== ABSTRACT ===== */

.block.abstract{
}

/* ===== TEXT ===== */

.block.text{
  text-align:justify;
}

/* ===== REFERENCE ===== */

.block.reference_content,
.block.footnote,
.block.vision_footnote{
  font-size:12px;
  color:#333;
}

/* ===== TABLE ===== */

.block table{
  border-collapse:collapse;
  width:100%;
  font-size:12px;
}

.block table td,
.block table th{
  border:1px solid #444;
  padding:2px;
  text-align:left;
}

/* ===== IMAGE ===== */

.block img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
}

.figure-group figcaption{
  font-size:13px;
  font-weight:bold;

}

    color: #444;

}
